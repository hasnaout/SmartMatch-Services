version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: smartmatch_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: SmartMatch
    volumes:
      - mongo_data:/data/db
    networks:
      - smartmatch_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartmatch_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      PORT:              5001
      MONGODB_URI:       mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongo:27017/SmartMatch?authSource=admin
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-7d}
      GROQ_API_KEY:      ${GROQ_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      IMGBB_API_KEY:     ${IMGBB_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - smartmatch_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/"]
      interval: 15s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: smartmatch_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - smartmatch_net

volumes:
  mongo_data:
  uploads_data:

networks:
  smartmatch_net:
    driver: bridge